<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">OOD Interview Answer Flow</title>
  <desc id="desc">A compact diagram showing object-oriented design interview answer steps and OOP principles.</desc>
  <rect width="1200" height="760" fill="#f7f5ef"/>
  <rect x="72" y="62" width="1056" height="636" rx="18" fill="#fffdf8" stroke="#2f3437" stroke-width="3"/>
  <text x="116" y="132" fill="#202426" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700">OOD Interview Answer Flow</text>
  <text x="118" y="178" fill="#5d666b" font-family="Inter, Arial, sans-serif" font-size="24">Clarify the system, shape the objects, then explain behavior and tradeoffs.</text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(120 238)">
      <rect width="180" height="96" rx="12" fill="#e7f0ea" stroke="#1f4d39" stroke-width="2"/>
      <circle cx="42" cy="48" r="22" fill="#143d2d"/>
      <text x="36" y="57" fill="#ffffff" font-size="25" font-weight="800">1</text>
      <text x="76" y="43" fill="#1f2a24" font-size="23" font-weight="700">Clarify</text>
      <text x="76" y="70" fill="#4b5a51" font-size="17">requirements</text>
    </g>
    <path d="M316 286 H378" stroke="#2f3437" stroke-width="3" stroke-linecap="round"/>
    <path d="M370 276 L384 286 L370 296" fill="none" stroke="#2f3437" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(400 238)">
      <rect width="180" height="96" rx="12" fill="#e8eef7" stroke="#244d7d" stroke-width="2"/>
      <circle cx="42" cy="48" r="22" fill="#183d6b"/>
      <text x="35" y="57" fill="#ffffff" font-size="25" font-weight="800">2</text>
      <text x="76" y="43" fill="#202936" font-size="23" font-weight="700">Identify</text>
      <text x="76" y="70" fill="#4d5968" font-size="17">core classes</text>
    </g>
    <path d="M596 286 H658" stroke="#2f3437" stroke-width="3" stroke-linecap="round"/>
    <path d="M650 276 L664 286 L650 296" fill="none" stroke="#2f3437" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(680 238)">
      <rect width="200" height="96" rx="12" fill="#f7eadf" stroke="#7f4425" stroke-width="2"/>
      <circle cx="42" cy="48" r="22" fill="#663017"/>
      <text x="35" y="57" fill="#ffffff" font-size="25" font-weight="800">3</text>
      <text x="76" y="43" fill="#32261f" font-size="23" font-weight="700">Connect</text>
      <text x="76" y="70" fill="#665348" font-size="17">responsibilities</text>
    </g>
    <path d="M896 286 H958" stroke="#2f3437" stroke-width="3" stroke-linecap="round"/>
    <path d="M950 276 L964 286 L950 296" fill="none" stroke="#2f3437" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(980 238)">
      <rect width="100" height="96" rx="12" fill="#efe9f5" stroke="#644b7a" stroke-width="2"/>
      <text x="50" y="43" text-anchor="middle" fill="#2d2337" font-size="21" font-weight="700">APIs</text>
      <text x="50" y="70" text-anchor="middle" fill="#5d5268" font-size="16">flows</text>
    </g>

    <g transform="translate(176 410)">
      <rect width="848" height="96" rx="12" fill="#f4f1e8" stroke="#2f3437" stroke-width="2"/>
      <text x="424" y="42" text-anchor="middle" fill="#202426" font-size="25" font-weight="700">Extensibility + Edge Cases</text>
      <text x="424" y="70" text-anchor="middle" fill="#5d666b" font-size="18">Explain how the design scales and adapts to future requirements.</text>
    </g>

    <g transform="translate(154 572)" fill="#202426">
      <text x="0" y="0" font-size="24" font-weight="700">OOP Principles</text>
      <text x="0" y="42" font-size="20">Encapsulation</text>
      <text x="258" y="42" font-size="20">Abstraction</text>
      <text x="498" y="42" font-size="20">Inheritance</text>
      <text x="724" y="42" font-size="20">Polymorphism</text>
      <path d="M0 58 H892" stroke="#c8c0b4" stroke-width="2"/>
    </g>
  </g>
</svg>
