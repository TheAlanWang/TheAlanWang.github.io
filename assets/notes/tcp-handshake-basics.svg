<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1700" viewBox="0 0 1200 1700" role="img" aria-labelledby="title desc">
  <title id="title">TCP Handshake Basics</title>
  <desc id="desc">A poster explaining TCP three-way connection establishment, SYN, ACK, FIN, and four-way connection termination.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .ink { fill: #20242a; }
      .muted { fill: #68707b; }
      .panel { fill: #fffdf8; stroke: #d8d0c3; stroke-width: 3; }
      .panel-blue { fill: #edf5fb; stroke: #8eb5cf; stroke-width: 3; }
      .panel-green { fill: #eef7f0; stroke: #91bd99; stroke-width: 3; }
      .panel-red { fill: #fff1ed; stroke: #d79886; stroke-width: 3; }
      .lane { stroke: #939aa3; stroke-width: 4; stroke-dasharray: 12 14; }
      .arrow { stroke: #20242a; stroke-width: 5; fill: none; marker-end: url(#arrowhead); }
      .arrow-fin { stroke: #9d432e; stroke-width: 5; fill: none; marker-end: url(#arrowhead-red); }
      .badge { fill: #20242a; }
      .badge-blue { fill: #2f6f99; }
      .badge-green { fill: #33774a; }
      .badge-red { fill: #9d432e; }
      .white { fill: #ffffff; }
      .title { font: 800 58px/1.1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .subtitle { font: 500 25px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h2 { font: 800 34px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .h3 { font: 800 25px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .body { font: 500 23px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 500 19px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .caption { font: 600 19px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .mono { font: 800 24px/1.2 "SFMono-Regular", Consolas, monospace; letter-spacing: 0; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#20242a"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#9d432e"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1700"/>
  <rect x="54" y="54" width="1092" height="1592" rx="28" fill="none" stroke="#20242a" stroke-width="4"/>

  <text x="90" y="130" class="title ink">TCP Handshake Basics</text>
  <text x="92" y="174" class="subtitle muted">How TCP opens a connection, names control flags, and closes cleanly.</text>

  <rect x="90" y="220" width="1020" height="462" rx="18" class="panel-blue"/>
  <text x="126" y="275" class="h2 ink">1. Three-way handshake: open connection</text>
  <text x="220" y="335" class="h3 ink">Client</text>
  <text x="870" y="335" class="h3 ink">Server</text>
  <line x1="285" y1="355" x2="285" y2="625" class="lane"/>
  <line x1="915" y1="355" x2="915" y2="625" class="lane"/>

  <line x1="305" y1="388" x2="880" y2="388" class="arrow"/>
  <rect x="506" y="355" width="188" height="50" rx="25" class="badge-blue"/>
  <text x="550" y="389" class="mono white">SYN</text>
  <text x="600" y="435" class="caption muted">Client -> Server: I want to connect.</text>

  <line x1="895" y1="500" x2="320" y2="500" class="arrow"/>
  <rect x="482" y="467" width="236" height="50" rx="25" class="badge-blue"/>
  <text x="529" y="501" class="mono white">SYN-ACK</text>
  <text x="600" y="547" class="caption muted">Server -> Client: ACK request + SYN ready.</text>

  <line x1="305" y1="612" x2="880" y2="612" class="arrow"/>
  <rect x="506" y="579" width="188" height="50" rx="25" class="badge-blue"/>
  <text x="550" y="613" class="mono white">ACK</text>
  <text x="600" y="650" class="caption muted">Client -> Server: Confirmation received.</text>

  <rect x="90" y="712" width="1020" height="520" rx="18" class="panel-red"/>
  <text x="126" y="767" class="h2 ink">2. Four-way handshake: close connection</text>
  <text x="220" y="826" class="h3 ink">Client</text>
  <text x="870" y="826" class="h3 ink">Server</text>
  <line x1="285" y1="846" x2="285" y2="1174" class="lane"/>
  <line x1="915" y1="846" x2="915" y2="1174" class="lane"/>

  <line x1="305" y1="872" x2="880" y2="872" class="arrow-fin"/>
  <rect x="506" y="839" width="188" height="50" rx="25" class="badge-red"/>
  <text x="550" y="873" class="mono white">FIN</text>
  <text x="600" y="908" class="caption muted">Client -> Server: I am done sending.</text>

  <line x1="895" y1="964" x2="320" y2="964" class="arrow"/>
  <rect x="506" y="931" width="188" height="50" rx="25" class="badge"/>
  <text x="550" y="965" class="mono white">ACK</text>
  <text x="600" y="1002" class="caption muted">Server -> Client: Close request received.</text>

  <line x1="895" y1="1056" x2="320" y2="1056" class="arrow-fin"/>
  <rect x="506" y="1023" width="188" height="50" rx="25" class="badge-red"/>
  <text x="550" y="1057" class="mono white">FIN</text>
  <text x="600" y="1094" class="caption muted">Server -> Client: I am also done.</text>

  <line x1="305" y1="1148" x2="880" y2="1148" class="arrow"/>
  <rect x="506" y="1115" width="188" height="50" rx="25" class="badge"/>
  <text x="550" y="1149" class="mono white">ACK</text>
  <text x="600" y="1186" class="caption muted">Client -> Server: Close confirmation received.</text>
  <text x="126" y="1216" class="body ink">After these messages, the TCP connection is closed.</text>

  <rect x="90" y="1264" width="1020" height="276" rx="18" class="panel"/>
  <text x="126" y="1318" class="h2 ink">3. Key terms</text>
  <rect x="130" y="1364" width="285" height="128" rx="16" class="panel-blue"/>
  <rect x="457" y="1364" width="285" height="128" rx="16" class="panel-green"/>
  <rect x="784" y="1364" width="285" height="128" rx="16" class="panel-red"/>
  <text x="160" y="1412" class="mono ink">SYN</text>
  <text x="160" y="1447" class="small muted">Synchronize. Used to</text>
  <text x="160" y="1474" class="small muted">start a TCP connection.</text>
  <text x="487" y="1412" class="mono ink">ACK</text>
  <text x="487" y="1447" class="small muted">Acknowledgment. Means</text>
  <text x="487" y="1474" class="small muted">"I received it."</text>
  <text x="814" y="1412" class="mono ink">FIN</text>
  <text x="814" y="1447" class="small muted">Finish. Used when one</text>
  <text x="814" y="1474" class="small muted">side wants to close.</text>

  <rect x="90" y="1580" width="1020" height="42" rx="21" fill="#20242a"/>
  <text x="130" y="1609" class="small white">Summary: three-way = open | four-way = close | SYN = start | ACK = received | FIN = finish</text>
</svg>
