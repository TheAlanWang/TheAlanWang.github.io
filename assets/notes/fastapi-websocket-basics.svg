<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">FastAPI WebSocket Basics</title>
  <desc id="desc">A poster explaining the minimal FastAPI WebSocket echo endpoint, lifecycle, API shape, testing methods, and common pitfalls.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .ink { fill: #20242a; }
      .muted { fill: #68707b; }
      .soft { fill: #fdfbf6; stroke: #d8d0c3; stroke-width: 3; }
      .blue { fill: #edf5fb; stroke: #8eb5cf; stroke-width: 3; }
      .green { fill: #eef7f0; stroke: #91bd99; stroke-width: 3; }
      .yellow { fill: #fff7df; stroke: #d5b766; stroke-width: 3; }
      .red { fill: #fff1ed; stroke: #d79886; stroke-width: 3; }
      .purple { fill: #f2effb; stroke: #aa9ad2; stroke-width: 3; }
      .dark { fill: #20242a; }
      .line { stroke: #20242a; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .thin { stroke: #68707b; stroke-width: 3; fill: none; marker-end: url(#arrowhead-muted); }
      .title { font: 800 56px/1.1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .subtitle { font: 500 23px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h2 { font: 800 31px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .h3 { font: 800 23px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .body { font: 500 20px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 500 17px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { font: 600 14px/1.25 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 800 18px/1.25 "SFMono-Regular", Consolas, monospace; letter-spacing: 0; }
      .white { fill: #ffffff; }
      .center { text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#20242a"/>
    </marker>
    <marker id="arrowhead-muted" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#68707b"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1600"/>
  <rect x="54" y="54" width="1092" height="1492" rx="28" fill="none" stroke="#20242a" stroke-width="4"/>

  <text x="90" y="126" class="title ink">FastAPI WebSocket Basics</text>
  <text x="90" y="168" class="subtitle muted">A minimal echo endpoint and the lifecycle model behind it.</text>
  <rect x="90" y="196" width="1020" height="54" rx="27" class="dark"/>
  <text x="120" y="231" class="body white">A WebSocket handler lives as long as the connection lives.</text>

  <rect x="90" y="286" width="492" height="332" rx="22" class="blue"/>
  <text x="126" y="342" class="h2 ink">1. API Shape</text>
  <rect x="126" y="372" width="420" height="44" rx="12" fill="#ffffff" stroke="#8eb5cf" stroke-width="2"/>
  <text x="154" y="401" class="mono ink">@app.websocket("/ws/echo")</text>
  <rect x="126" y="432" width="190" height="70" rx="14" fill="#ffffff" stroke="#8eb5cf" stroke-width="2"/>
  <text x="154" y="462" class="h3 ink">accept()</text>
  <text x="154" y="488" class="tiny muted">complete handshake</text>
  <rect x="356" y="432" width="190" height="70" rx="14" fill="#ffffff" stroke="#8eb5cf" stroke-width="2"/>
  <text x="384" y="462" class="h3 ink">receive_*()</text>
  <text x="384" y="488" class="tiny muted">wait for message</text>
  <rect x="126" y="518" width="190" height="70" rx="14" fill="#ffffff" stroke="#8eb5cf" stroke-width="2"/>
  <text x="154" y="548" class="h3 ink">send_*()</text>
  <text x="154" y="574" class="tiny muted">push to client</text>
  <rect x="356" y="518" width="190" height="70" rx="14" fill="#ffffff" stroke="#8eb5cf" stroke-width="2"/>
  <text x="384" y="548" class="h3 ink">close()</text>
  <text x="384" y="574" class="tiny muted">end connection</text>

  <rect x="618" y="286" width="492" height="332" rx="22" class="green"/>
  <text x="654" y="342" class="h2 ink">2. Lifecycle</text>
  <circle cx="682" cy="390" r="18" class="dark"/>
  <text x="676" y="397" class="small white">1</text>
  <text x="720" y="397" class="small muted">client connects</text>
  <circle cx="682" cy="440" r="18" class="dark"/>
  <text x="675" y="447" class="small white">2</text>
  <text x="720" y="447" class="small muted">handler coroutine starts</text>
  <circle cx="682" cy="490" r="18" class="dark"/>
  <text x="675" y="497" class="small white">3</text>
  <text x="720" y="497" class="small muted">accept sends 101 response</text>
  <circle cx="682" cy="540" r="18" class="dark"/>
  <text x="675" y="547" class="small white">4</text>
  <text x="720" y="547" class="small muted">receive waits without busy-looping</text>
  <circle cx="682" cy="590" r="18" class="dark"/>
  <text x="675" y="597" class="small white">5</text>
  <text x="720" y="597" class="small muted">disconnect raises WebSocketDisconnect</text>

  <rect x="90" y="658" width="1020" height="300" rx="22" class="soft"/>
  <text x="126" y="714" class="h2 ink">3. Standard Echo Pattern</text>
  <rect x="126" y="758" width="190" height="96" rx="16" class="blue"/>
  <text x="164" y="798" class="h3 ink">accept</text>
  <text x="154" y="830" class="small muted">finish handshake</text>
  <line x1="332" y1="806" x2="394" y2="806" class="thin"/>
  <rect x="410" y="758" width="190" height="96" rx="16" class="yellow"/>
  <text x="448" y="798" class="h3 ink">receive</text>
  <text x="440" y="830" class="small muted">wait for text</text>
  <line x1="616" y1="806" x2="678" y2="806" class="thin"/>
  <rect x="694" y="758" width="190" height="96" rx="16" class="green"/>
  <text x="742" y="798" class="h3 ink">send</text>
  <text x="726" y="830" class="small muted">echo reply</text>
  <line x1="790" y1="870" x2="506" y2="902" class="thin"/>
  <text x="126" y="920" class="body ink">Loop until disconnect, then cleanup.</text>
  <text x="126" y="948" class="small muted">The loop is the connection. The exception is the exit signal.</text>

  <rect x="90" y="998" width="492" height="260" rx="22" class="yellow"/>
  <text x="126" y="1054" class="h2 ink">4. Testing</text>
  <text x="126" y="1100" class="small muted">Browser DevTools console</text>
  <text x="126" y="1132" class="mono ink">ws = new WebSocket(...)</text>
  <text x="126" y="1182" class="small muted">CLI</text>
  <text x="126" y="1214" class="mono ink">websocat ws://.../ws/echo</text>

  <rect x="618" y="998" width="492" height="260" rx="22" class="red"/>
  <text x="654" y="1054" class="h2 ink">5. Common Pitfalls</text>
  <text x="654" y="1100" class="small muted">Forgetting accept()</text>
  <text x="654" y="1134" class="small muted">No while True loop</text>
  <text x="654" y="1168" class="small muted">Not catching WebSocketDisconnect</text>
  <text x="654" y="1202" class="small muted">Blocking calls inside async def</text>

  <rect x="90" y="1298" width="1020" height="124" rx="22" class="purple"/>
  <text x="126" y="1354" class="h2 ink">6. Mental Model</text>
  <text x="126" y="1398" class="body ink">HTTP handler: called once, returns once. WebSocket handler: runs until the connection closes.</text>

  <rect x="90" y="1468" width="1020" height="54" rx="27" class="dark"/>
  <text x="120" y="1503" class="body white">while True + receive_* + send_* + WebSocketDisconnect is the basic shape.</text>
</svg>
