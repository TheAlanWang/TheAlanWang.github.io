<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">WebSocket Connection Manager</title>
  <desc id="desc">A poster explaining how a FastAPI WebSocket connection manager tracks users, multiple tabs, targeted sends, broadcast, cleanup, and single-process limits.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .ink { fill: #20242a; }
      .muted { fill: #68707b; }
      .soft { fill: #fdfbf6; stroke: #d8d0c3; stroke-width: 3; }
      .blue { fill: #edf5fb; stroke: #8eb5cf; stroke-width: 3; }
      .green { fill: #eef7f0; stroke: #91bd99; stroke-width: 3; }
      .yellow { fill: #fff7df; stroke: #d5b766; stroke-width: 3; }
      .red { fill: #fff1ed; stroke: #d79886; stroke-width: 3; }
      .purple { fill: #f2effb; stroke: #aa9ad2; stroke-width: 3; }
      .dark { fill: #20242a; }
      .line { stroke: #20242a; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .thin { stroke: #68707b; stroke-width: 3; fill: none; marker-end: url(#arrowhead-muted); }
      .title { font: 800 56px/1.1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .subtitle { font: 500 23px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h2 { font: 800 31px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .h3 { font: 800 23px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .body { font: 500 20px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 500 17px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { font: 600 14px/1.25 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 800 18px/1.25 "SFMono-Regular", Consolas, monospace; letter-spacing: 0; }
      .white { fill: #ffffff; }
      .center { text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#20242a"/>
    </marker>
    <marker id="arrowhead-muted" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#68707b"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1600"/>
  <rect x="54" y="54" width="1092" height="1492" rx="28" fill="none" stroke="#20242a" stroke-width="4"/>

  <text x="90" y="126" class="title ink">WebSocket Connection Manager</text>
  <text x="90" y="168" class="subtitle muted">Track who is connected so the backend can push to the right clients.</text>
  <rect x="90" y="196" width="1020" height="54" rx="27" class="dark"/>
  <text x="120" y="231" class="body white">Without shared connection state, every WebSocket handler is just an isolated echo loop.</text>

  <rect x="90" y="286" width="492" height="300" rx="22" class="blue"/>
  <text x="126" y="342" class="h2 ink">1. Why Manager Exists</text>
  <text x="126" y="388" class="small muted">Each handler only owns its own socket.</text>
  <text x="126" y="432" class="mono ink">handler A -> websocket A</text>
  <text x="126" y="466" class="mono ink">handler B -> websocket B</text>
  <text x="126" y="510" class="body ink">A shared manager makes cross-connection</text>
  <text x="126" y="540" class="body ink">push possible.</text>

  <rect x="618" y="286" width="492" height="300" rx="22" class="green"/>
  <text x="654" y="342" class="h2 ink">2. Core Data Shape</text>
  <rect x="654" y="380" width="390" height="52" rx="14" fill="#ffffff" stroke="#91bd99" stroke-width="2"/>
  <text x="682" y="414" class="mono ink">dict[int, set[WebSocket]]</text>
  <text x="654" y="470" class="small muted">One user can have many tabs or devices.</text>
  <text x="654" y="506" class="small muted">Do not use dict[int, WebSocket];</text>
  <text x="654" y="532" class="small muted">the second tab would overwrite the first.</text>

  <rect x="90" y="626" width="1020" height="300" rx="22" class="soft"/>
  <text x="126" y="682" class="h2 ink">3. Manager Responsibilities</text>
  <rect x="126" y="730" width="190" height="88" rx="16" class="blue"/>
  <text x="164" y="766" class="h3 ink">connect</text>
  <text x="150" y="794" class="tiny muted">accept + register</text>
  <line x1="332" y1="774" x2="394" y2="774" class="thin"/>
  <rect x="410" y="730" width="190" height="88" rx="16" class="yellow"/>
  <text x="444" y="766" class="h3 ink">send_user</text>
  <text x="436" y="794" class="tiny muted">target all tabs</text>
  <line x1="616" y1="774" x2="678" y2="774" class="thin"/>
  <rect x="694" y="730" width="190" height="88" rx="16" class="green"/>
  <text x="730" y="766" class="h3 ink">broadcast</text>
  <text x="726" y="794" class="tiny muted">all users, all tabs</text>
  <line x1="790" y1="836" x2="506" y2="868" class="thin"/>
  <text x="126" y="888" class="body ink">disconnect cleans internal bookkeeping and removes empty user keys.</text>

  <rect x="90" y="966" width="492" height="260" rx="22" class="yellow"/>
  <text x="126" y="1022" class="h2 ink">4. Safe Sending</text>
  <text x="126" y="1068" class="mono ink">for ws in conns.copy():</text>
  <text x="154" y="1102" class="mono ink">try: await ws.send_json(msg)</text>
  <text x="154" y="1136" class="mono ink">except: skip dead socket</text>
  <text x="126" y="1182" class="small muted">Copy before iterating because await can let</text>
  <text x="126" y="1208" class="small muted">another coroutine modify the set.</text>

  <rect x="618" y="966" width="492" height="260" rx="22" class="red"/>
  <text x="654" y="1022" class="h2 ink">5. Demo Limits</text>
  <text x="654" y="1068" class="small muted">No auth: query user_id can be spoofed.</text>
  <text x="654" y="1102" class="small muted">No heartbeat: half-open sockets can linger.</text>
  <text x="654" y="1136" class="small muted">No cross-worker sharing: each process owns its manager.</text>
  <text x="654" y="1190" class="body ink">Later: JWT auth, ping/pong, Redis Pub/Sub.</text>

  <rect x="90" y="1266" width="1020" height="150" rx="22" class="purple"/>
  <text x="126" y="1322" class="h2 ink">6. Mental Model</text>
  <text x="126" y="1366" class="body ink">Connection manager = online user index + push router.</text>
  <text x="126" y="1398" class="small muted">It is the first real stateful component in a WebSocket backend.</text>

  <rect x="90" y="1462" width="1020" height="54" rx="27" class="dark"/>
  <text x="120" y="1497" class="body white">Track sets of sockets, clean up on disconnect, copy before sending.</text>
</svg>
